<!DOCTYPE html>
<html lang="lv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PAX8 ↔ Moneo</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #f8fafc; }
    .spinner {
      border: 3px solid #e2e8f0;
      border-top-color: #3b82f6;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      animation: spin 0.7s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .fade-in { animation: fadeIn 0.2s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
    tr.expandable:hover { cursor: pointer; }
    .detail-row td { background: #f1f5f9; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ── helpers ──────────────────────────────────────────────────────────────────

const MONTH_NAMES = [
  '', 'Janvāris', 'Februāris', 'Marts', 'Aprīlis', 'Maijs', 'Jūnijs',
  'Jūlijs', 'Augusts', 'Septembris', 'Oktobris', 'Novembris', 'Decembris'
];

function fmt(n, decimals = 2) {
  if (n == null) return '—';
  return Number(n).toLocaleString('lv-LV', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
}

function fmtEur(n) { return fmt(n) + ' €'; }

async function apiFetch(path, opts = {}) {
  const res = await fetch(path, {
    headers: { 'Content-Type': 'application/json' },
    ...opts,
  });
  const json = await res.json().catch(() => ({ error: 'Invalid response' }));
  if (!res.ok) throw new Error(json.error || `HTTP ${res.status}`);
  return json;
}

// Module-level cache for GET responses — shared across tabs.
const __apiCache = new Map();

async function apiGetCached(key, path, { force = false } = {}) {
  if (!force && __apiCache.has(key)) return __apiCache.get(key);
  const data = await apiFetch(path);
  __apiCache.set(key, data);
  return data;
}

function cacheInvalidate(prefix) {
  if (prefix == null) { __apiCache.clear(); return; }
  for (const k of Array.from(__apiCache.keys())) {
    if (k === prefix || k.startsWith(prefix + ':') || k.startsWith(prefix)) {
      __apiCache.delete(k);
    }
  }
}

// ── Status badge ─────────────────────────────────────────────────────────────

function StatusBadge({ status }) {
  const map = {
    invoiced_paid:   { cls: 'bg-green-100 text-green-800',  label: 'Apmaksāts' },
    invoiced_unpaid: { cls: 'bg-yellow-100 text-yellow-800', label: 'Nav apmaksāts' },
    not_invoiced:    { cls: 'bg-red-100 text-red-800',       label: 'Nav rēķina' },
  };
  const s = map[status] || { cls: 'bg-gray-100 text-gray-600', label: status || '—' };
  return (
    <span className={`inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${s.cls}`}>
      {s.label}
    </span>
  );
}

// ── Toast notification ────────────────────────────────────────────────────────

function Toast({ msg, type, onDismiss }) {
  useEffect(() => {
    const t = setTimeout(onDismiss, 4000);
    return () => clearTimeout(t);
  }, []);
  const colors = { success: 'bg-green-600', error: 'bg-red-600', info: 'bg-blue-600' };
  return (
    <div className={`fixed bottom-4 right-4 z-50 ${colors[type] || colors.info} text-white px-4 py-3 rounded-lg shadow-lg flex items-center gap-3 fade-in`}>
      <span>{msg}</span>
      <button onClick={onDismiss} className="opacity-70 hover:opacity-100 text-lg leading-none">&times;</button>
    </div>
  );
}

function useToast() {
  const [toast, setToast] = useState(null);
  const show = useCallback((msg, type = 'info') => setToast({ msg, type, id: Date.now() }), []);
  const dismiss = useCallback(() => setToast(null), []);
  const el = toast ? <Toast key={toast.id} msg={toast.msg} type={toast.type} onDismiss={dismiss} /> : null;
  return [show, el];
}

// ── Spinner ───────────────────────────────────────────────────────────────────

function Spinner({ small }) {
  return <span className="spinner" style={small ? { width: 16, height: 16, borderWidth: 2 } : {}} />;
}

// ── Line detail panel ─────────────────────────────────────────────────────────

function BillingDetailRow({ pax8Id, year, month, moneoCode }) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);

  useEffect(() => {
    setLoading(true);
    apiFetch(`/api/billing?pax8_company_id=${pax8Id}&year=${year}&month=${month}`)
      .then(setData)
      .catch(e => setError(e.message))
      .finally(() => setLoading(false));
  }, [pax8Id, year, month]);

  if (loading) return (
    <tr className="detail-row">
      <td colSpan={7} className="px-6 py-4 text-center"><Spinner /></td>
    </tr>
  );

  if (error) return (
    <tr className="detail-row">
      <td colSpan={7} className="px-6 py-3 text-red-600 text-sm">Kļūda: {error}</td>
    </tr>
  );

  if (!data || !data.lines || data.lines.length === 0) return (
    <tr className="detail-row">
      <td colSpan={7} className="px-6 py-3 text-gray-500 text-sm italic">Nav PAX8 datu šajā mēnesī</td>
    </tr>
  );

  return (
    <tr className="detail-row fade-in">
      <td colSpan={7} className="px-6 pb-4 pt-1">
        <div className="rounded-lg border border-slate-200 overflow-hidden text-sm">
          <table className="min-w-full">
            <thead className="bg-slate-100">
              <tr>
                <th className="px-3 py-2 text-left text-xs font-semibold text-slate-500 uppercase">PAX8 SKU</th>
                <th className="px-3 py-2 text-left text-xs font-semibold text-slate-500 uppercase">Nosaukums</th>
                <th className="px-3 py-2 text-left text-xs font-semibold text-slate-500 uppercase">Moneo kods</th>
                <th className="px-3 py-2 text-right text-xs font-semibold text-slate-500 uppercase">Daudzums</th>
                <th className="px-3 py-2 text-right text-xs font-semibold text-slate-500 uppercase">Vienības cena</th>
                <th className="px-3 py-2 text-right text-xs font-semibold text-slate-500 uppercase">Kopā (PAX8)</th>
              </tr>
            </thead>
            <tbody className="divide-y divide-slate-100 bg-white">
              {data.lines.map((line, i) => (
                <tr key={i} className="hover:bg-slate-50">
                  <td className="px-3 py-2 font-mono text-xs text-slate-600">{line.sku || '—'}</td>
                  <td className="px-3 py-2 text-slate-700 max-w-xs truncate" title={line.name}>{line.name || '—'}</td>
                  <td className="px-3 py-2 font-mono text-xs text-blue-700">{line.moneo_itemcode || '—'}</td>
                  <td className="px-3 py-2 text-right text-slate-700">{fmt(line.quantity, 2)}</td>
                  <td className="px-3 py-2 text-right text-slate-700">{fmtEur(line.unit_cost)}</td>
                  <td className="px-3 py-2 text-right font-medium text-slate-800">{fmtEur(line.total_cost)}</td>
                </tr>
              ))}
            </tbody>
            <tfoot className="bg-slate-50 border-t border-slate-200">
              <tr>
                <td colSpan={5} className="px-3 py-2 text-right text-sm font-semibold text-slate-600">Kopā PAX8:</td>
                <td className="px-3 py-2 text-right text-sm font-bold text-slate-800">{fmtEur(data.total_cost)}</td>
              </tr>
            </tfoot>
          </table>
        </div>
      </td>
    </tr>
  );
}

// ── Inline editable amount ────────────────────────────────────────────────────

function EditableAmount({ value, originalValue, onSave }) {
  const [editing, setEditing] = useState(false);
  const [input, setInput] = useState(String(value ?? 0));
  const inputRef = useRef(null);

  useEffect(() => { setInput(String(value ?? 0)); }, [value]);
  useEffect(() => { if (editing && inputRef.current) inputRef.current.select(); }, [editing]);

  function commit() {
    const parsed = parseFloat(input.replace(',', '.'));
    if (!Number.isFinite(parsed)) { setEditing(false); return; }
    if (parsed !== Number(value)) onSave(parsed);
    setEditing(false);
  }

  if (editing) {
    return (
      <input
        ref={inputRef}
        type="text"
        value={input}
        onChange={e => setInput(e.target.value)}
        onBlur={commit}
        onKeyDown={e => {
          if (e.key === 'Enter') commit();
          if (e.key === 'Escape') { setInput(String(value ?? 0)); setEditing(false); }
        }}
        className="w-24 border border-blue-400 rounded px-2 py-0.5 text-sm font-mono text-right focus:outline-none focus:ring-2 focus:ring-blue-400"
      />
    );
  }

  const overridden = originalValue != null && Number(value) !== Number(originalValue);

  return (
    <button
      type="button"
      onClick={() => setEditing(true)}
      title={overridden ? `Pilna rēķina summa: ${fmtEur(originalValue)}` : 'Labot summu (tikai šai rindai)'}
      className="font-mono text-sm font-medium text-slate-800 hover:text-blue-700 inline-flex items-center gap-1 cursor-pointer"
    >
      <span className={overridden ? 'border-b border-dashed border-amber-400' : 'border-b border-dotted border-slate-300'}>
        {fmtEur(value)}
      </span>
      <span className="text-xs text-slate-400">✎</span>
    </button>
  );
}

// ── Invoice picker (manual link from existing Moneo invoices) ─────────────────

function InvoicePicker({ customerCode, onPick }) {
  const [invoices, setInvoices] = useState(null);
  const [query, setQuery] = useState('');
  const [open, setOpen] = useState(false);
  const [loading, setLoading] = useState(false);
  const wrapRef = useRef(null);

  useEffect(() => {
    function onDocClick(e) {
      if (wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false);
    }
    document.addEventListener('mousedown', onDocClick);
    return () => document.removeEventListener('mousedown', onDocClick);
  }, []);

  async function load() {
    if (invoices !== null) return;
    setLoading(true);
    try {
      const data = await apiFetch(`/api/invoices?moneo_customer_code=${customerCode}`);
      const list = (Array.isArray(data) ? data : [])
        .slice()
        .sort((a, b) => String(b.invdate || '').localeCompare(String(a.invdate || '')));
      setInvoices(list);
    } catch {
      setInvoices([]);
    } finally {
      setLoading(false);
    }
  }

  const q = query.trim().toLowerCase();
  const list = invoices || [];
  const filtered = !q
    ? list.slice(0, 15)
    : list
        .filter(i =>
          String(i.invnr || '').toLowerCase().includes(q) ||
          String(i.invdate || '').includes(q)
        )
        .slice(0, 15);

  return (
    <div ref={wrapRef} className="relative inline-block">
      <input
        type="text"
        value={query}
        onChange={e => { setQuery(e.target.value); setOpen(true); }}
        onFocus={() => { setOpen(true); load(); }}
        placeholder="Piesaistīt Nr..."
        className="w-32 border border-slate-300 rounded px-2 py-1 text-xs focus:outline-none focus:ring-2 focus:ring-blue-400"
      />
      {open && (
        <div className="absolute z-20 mt-1 right-0 w-72 max-h-64 overflow-auto bg-white border border-slate-200 rounded-lg shadow-lg">
          {loading && <div className="px-3 py-2 text-xs text-slate-400 italic flex items-center gap-2"><Spinner small /> Ielādē...</div>}
          {!loading && filtered.length === 0 && (
            <div className="px-3 py-2 text-xs text-slate-400 italic">Nav atbilstošu rēķinu</div>
          )}
          {!loading && filtered.map(inv => (
            <div
              key={inv.invnr}
              onMouseDown={e => {
                e.preventDefault();
                onPick(inv);
                setOpen(false);
                setQuery('');
              }}
              className="px-3 py-2 hover:bg-blue-50 cursor-pointer border-b border-slate-100 last:border-b-0 text-left"
            >
              <div className="flex justify-between gap-2 items-center">
                <span className="font-mono text-xs font-medium text-blue-700">#{inv.invnr}</span>
                <span className="text-xs text-slate-500">{inv.invdate}</span>
              </div>
              <div className="flex justify-between gap-2 mt-0.5">
                <span className="text-xs text-slate-700">{fmtEur(inv.total)}</span>
                <StatusBadge status={inv.payment_status === 'paid' ? 'invoiced_paid' : 'invoiced_unpaid'} />
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── Dashboard tab ─────────────────────────────────────────────────────────────

function DashboardTab() {
  const today = new Date();
  const [year, setYear] = useState(today.getFullYear());
  const [month, setMonth] = useState(today.getMonth() + 1);
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [expanded, setExpanded] = useState({});
  const [generating, setGenerating] = useState({});
  const [showToast, toastEl] = useToast();

  const fetchStatus = useCallback((force = false) => {
    const key = `status:${year}-${month}`;
    if (!force && __apiCache.has(key)) {
      setData(__apiCache.get(key));
      setError(null);
      return;
    }
    setLoading(true);
    setError(null);
    setExpanded({});
    apiFetch(`/api/status?year=${year}&month=${month}`)
      .then(d => { __apiCache.set(key, d); setData(d); })
      .catch(e => setError(e.message))
      .finally(() => setLoading(false));
  }, [year, month]);

  useEffect(() => { fetchStatus(); }, [fetchStatus]);

  function toggleExpand(id) {
    setExpanded(prev => ({ ...prev, [id]: !prev[id] }));
  }

  async function handleGenerate(company) {
    const key = company.pax8_id;
    setGenerating(prev => ({ ...prev, [key]: true }));
    try {
      const res = await apiFetch('/api/generate-invoice', {
        method: 'POST',
        body: JSON.stringify({
          pax8_company_id: company.pax8_id,
          moneo_customer_code: company.moneo_code,
          year,
          month,
        }),
      });
      showToast(`Rēķins ${res.invoice_nr} veiksmīgi izveidots! Kopsumma: ${fmtEur(res.total)}`, 'success');
      cacheInvalidate('status');
      cacheInvalidate(`invoices:${company.moneo_code}`);
      fetchStatus(true);
    } catch (e) {
      showToast(`Kļūda: ${e.message}`, 'error');
    } finally {
      setGenerating(prev => ({ ...prev, [key]: false }));
    }
  }

  async function handleLinkInvoice(company, inv) {
    try {
      await apiFetch('/api/manual-links', {
        method: 'POST',
        body: JSON.stringify({
          year, month,
          pax8_id: company.pax8_id,
          invoice_nr: inv.invnr,
          invoice_date: inv.invdate,
          amount: Number(inv.total) || 0,
          original_total: Number(inv.total) || 0,
          payment_status: inv.payment_status || 'unpaid',
        }),
      });
      showToast(`Piesaistīts rēķins #${inv.invnr}`, 'success');
      cacheInvalidate('status');
      fetchStatus(true);
    } catch (e) {
      showToast(`Kļūda saglabājot: ${e.message}`, 'error');
    }
  }

  async function handleOverrideAmount(company, newAmount) {
    const amount = Number(newAmount);
    if (!Number.isFinite(amount) || amount < 0) {
      showToast('Nederīga summa', 'error');
      return;
    }
    const inv = company.invoices?.[0];
    if (!inv) return;
    try {
      await apiFetch('/api/manual-links', {
        method: 'POST',
        body: JSON.stringify({
          year, month,
          pax8_id: company.pax8_id,
          invoice_nr: inv.invnr,
          invoice_date: inv.invdate,
          amount,
          original_total: inv._original_total ?? inv.total,
          payment_status: inv.payment_status || 'unpaid',
        }),
      });
      cacheInvalidate('status');
      fetchStatus(true);
    } catch (e) {
      showToast(`Kļūda saglabājot: ${e.message}`, 'error');
    }
  }

  async function handleUnlinkInvoice(company) {
    try {
      await apiFetch('/api/manual-links', {
        method: 'DELETE',
        body: JSON.stringify({ year, month, pax8_id: company.pax8_id }),
      });
      showToast('Rēķins atsaistīts', 'info');
      cacheInvalidate('status');
      fetchStatus(true);
    } catch (e) {
      showToast(`Kļūda: ${e.message}`, 'error');
    }
  }

  const years = [];
  for (let y = today.getFullYear() - 2; y <= today.getFullYear() + 1; y++) years.push(y);

  return (
    <div className="space-y-5">
      {toastEl}

      {/* Month/year selector */}
      <div className="flex flex-wrap items-center gap-3 bg-white border border-slate-200 rounded-xl p-4 shadow-sm">
        <label className="text-sm font-medium text-slate-600">Periods:</label>
        <select
          value={month}
          onChange={e => setMonth(Number(e.target.value))}
          className="border border-slate-300 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
        >
          {MONTH_NAMES.slice(1).map((name, i) => (
            <option key={i+1} value={i+1}>{name}</option>
          ))}
        </select>
        <select
          value={year}
          onChange={e => setYear(Number(e.target.value))}
          className="border border-slate-300 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
        >
          {years.map(y => <option key={y} value={y}>{y}</option>)}
        </select>
        <button
          onClick={() => fetchStatus(true)}
          disabled={loading}
          className="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium px-4 py-1.5 rounded-lg disabled:opacity-50 transition-colors"
        >
          {loading ? <Spinner small /> : null}
          Atjaunot
        </button>

        {data?.summary && (
          <div className="ml-auto flex gap-6 text-sm">
            <div className="text-center">
              <div className="text-xs text-slate-500">Nav rēķina</div>
              <div className="font-bold text-red-600">{data.summary.not_invoiced_count}</div>
            </div>
            <div className="text-center">
              <div className="text-xs text-slate-500">Nav apmaksāts</div>
              <div className="font-bold text-yellow-600">{data.summary.unpaid_count}</div>
            </div>
            <div className="text-center">
              <div className="text-xs text-slate-500">Apmaksāts</div>
              <div className="font-bold text-green-600">{data.summary.paid_count}</div>
            </div>
            <div className="text-center">
              <div className="text-xs text-slate-500">Peļņa</div>
              <div className={`font-bold ${data.summary.total_profit >= 0 ? 'text-green-700' : 'text-red-600'}`}>
                {fmtEur(data.summary.total_profit)}
              </div>
            </div>
          </div>
        )}
      </div>

      {/* Error state */}
      {error && (
        <div className="bg-red-50 border border-red-200 rounded-xl p-4 text-red-700 text-sm">
          <strong>Kļūda:</strong> {error}
        </div>
      )}

      {/* Loading placeholder */}
      {loading && !data && (
        <div className="flex justify-center py-20"><Spinner /></div>
      )}

      {/* Main table */}
      {data && (
        <div className="bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden">
          <table className="min-w-full divide-y divide-slate-200">
            <thead className="bg-slate-50">
              <tr>
                <th className="w-8"></th>
                <th className="px-4 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Uzņēmums</th>
                <th className="px-4 py-3 text-right text-xs font-semibold text-slate-500 uppercase tracking-wider">PAX8 izmaksas</th>
                <th className="px-4 py-3 text-right text-xs font-semibold text-slate-500 uppercase tracking-wider">Moneo rēķins</th>
                <th className="px-4 py-3 text-right text-xs font-semibold text-slate-500 uppercase tracking-wider">Peļņa</th>
                <th className="px-4 py-3 text-center text-xs font-semibold text-slate-500 uppercase tracking-wider">Statuss</th>
                <th className="px-4 py-3 text-center text-xs font-semibold text-slate-500 uppercase tracking-wider">Darbības</th>
              </tr>
            </thead>
            <tbody className="divide-y divide-slate-100">
              {data.companies.length === 0 && (
                <tr>
                  <td colSpan={7} className="px-4 py-10 text-center text-slate-400 italic">
                    Nav konfigurētu uzņēmumu. Dodieties uz "Iestatījumi".
                  </td>
                </tr>
              )}
              {data.companies.map(company => (
                <React.Fragment key={company.pax8_id}>
                  <tr
                    className="expandable hover:bg-slate-50 transition-colors"
                    onClick={() => toggleExpand(company.pax8_id)}
                  >
                    {/* Expand toggle */}
                    <td className="pl-4 text-slate-400 text-lg select-none">
                      {expanded[company.pax8_id] ? '▾' : '▸'}
                    </td>
                    {/* Company */}
                    <td className="px-4 py-3">
                      <div className="font-medium text-slate-800">{company.moneo_name || company.pax8_name}</div>
                      <div className="text-xs text-slate-400 font-mono">{company.moneo_code} · {company.pax8_name}</div>
                    </td>
                    {/* PAX8 cost */}
                    <td className="px-4 py-3 text-right font-mono text-sm text-slate-700">
                      {fmtEur(company.pax8_cost)}
                    </td>
                    {/* Moneo invoice */}
                    <td className="px-4 py-3 text-right" onClick={e => e.stopPropagation()}>
                      {company.invoices.length > 0 ? (
                        <div>
                          {company.manual_linked ? (
                            <div className="flex items-center justify-end gap-2">
                              <EditableAmount
                                value={company.moneo_total}
                                originalValue={company.invoices[0]?._original_total}
                                onSave={v => handleOverrideAmount(company, v)}
                              />
                              <button
                                onClick={() => handleUnlinkInvoice(company)}
                                title="Atsaistīt rēķinu"
                                className="text-xs text-red-400 hover:text-red-600"
                              >
                                ✕
                              </button>
                            </div>
                          ) : (
                            <div className="font-mono text-sm font-medium text-slate-800">{fmtEur(company.moneo_total)}</div>
                          )}
                          {company.invoices.map(inv => (
                            <div key={inv.invnr} className="text-xs text-slate-400">
                              #{inv.invnr} · {inv.invdate}
                              {company.manual_linked && <span className="ml-1 text-amber-500">(manuāli)</span>}
                            </div>
                          ))}
                        </div>
                      ) : (
                        <span className="text-slate-300 text-sm italic">—</span>
                      )}
                    </td>
                    {/* Profit */}
                    <td className="px-4 py-3 text-right">
                      {company.moneo_total > 0 ? (
                        <div>
                          <div className={`font-mono text-sm font-semibold ${company.profit >= 0 ? 'text-green-700' : 'text-red-600'}`}>
                            {fmtEur(company.profit)}
                          </div>
                          <div className="text-xs text-slate-400">{fmt(company.profit_pct, 1)}%</div>
                        </div>
                      ) : (
                        <span className="text-slate-300 text-sm italic">—</span>
                      )}
                    </td>
                    {/* Status */}
                    <td className="px-4 py-3 text-center" onClick={e => e.stopPropagation()}>
                      <StatusBadge status={company.status} />
                    </td>
                    {/* Actions */}
                    <td className="px-4 py-3 text-center" onClick={e => e.stopPropagation()}>
                      {company.status === 'not_invoiced' && company.moneo_code && (
                        <div className="flex flex-col items-center gap-1.5">
                          <button
                            onClick={() => handleGenerate(company)}
                            disabled={!!generating[company.pax8_id]}
                            className="flex items-center gap-1.5 bg-blue-600 hover:bg-blue-700 text-white text-xs font-medium px-3 py-1.5 rounded-lg disabled:opacity-50 transition-colors"
                          >
                            {generating[company.pax8_id] ? <Spinner small /> : null}
                            Ģenerēt rēķinu
                          </button>
                          <InvoicePicker
                            customerCode={company.moneo_code}
                            onPick={inv => handleLinkInvoice(company, inv)}
                          />
                        </div>
                      )}
                      {company.status !== 'not_invoiced' && (
                        <span className="text-xs text-slate-300">—</span>
                      )}
                      {company.status === 'not_invoiced' && !company.moneo_code && (
                        <span className="text-xs text-amber-500 italic">Nav kartēts</span>
                      )}
                    </td>
                  </tr>
                  {/* Expanded detail */}
                  {expanded[company.pax8_id] && (
                    <BillingDetailRow
                      pax8Id={company.pax8_id}
                      year={year}
                      month={month}
                      moneoCode={company.moneo_code}
                    />
                  )}
                </React.Fragment>
              ))}
            </tbody>

            {/* Summary footer */}
            {data.companies.length > 0 && data.summary && (
              <tfoot className="bg-slate-50 border-t-2 border-slate-200">
                <tr>
                  <td colSpan={2} className="px-4 py-3 text-sm font-semibold text-slate-600">
                    Kopā ({data.companies.length} uzņēmumi)
                  </td>
                  <td className="px-4 py-3 text-right font-mono text-sm font-bold text-slate-800">
                    {fmtEur(data.summary.total_pax8_cost)}
                  </td>
                  <td className="px-4 py-3 text-right font-mono text-sm font-bold text-slate-800">
                    {fmtEur(data.summary.total_moneo)}
                  </td>
                  <td className="px-4 py-3 text-right font-mono text-sm font-bold text-green-700">
                    {fmtEur(data.summary.total_profit)}
                  </td>
                  <td colSpan={2}></td>
                </tr>
              </tfoot>
            )}
          </table>
        </div>
      )}
    </div>
  );
}

// ── Moneo customer autocomplete ───────────────────────────────────────────────

function MoneoCustomerAutocomplete({ customers, value, onChange, onSelect, placeholder, className }) {
  const [open, setOpen] = useState(false);
  const wrapRef = useRef(null);

  useEffect(() => {
    function onDocClick(e) {
      if (wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false);
    }
    document.addEventListener('mousedown', onDocClick);
    return () => document.removeEventListener('mousedown', onDocClick);
  }, []);

  const q = (value || '').trim().toLowerCase();
  const filtered = !q
    ? customers.slice(0, 20)
    : customers
        .filter(c =>
          (c.companyname || '').toLowerCase().includes(q) ||
          (c.custcode || '').toLowerCase().includes(q)
        )
        .slice(0, 20);

  return (
    <div ref={wrapRef} className="relative">
      <input
        type="text"
        value={value || ''}
        onChange={e => { onChange(e.target.value); setOpen(true); }}
        onFocus={() => setOpen(true)}
        placeholder={placeholder}
        className={className}
      />
      {open && filtered.length > 0 && (
        <div className="absolute z-20 mt-1 w-72 max-h-64 overflow-auto bg-white border border-slate-200 rounded-lg shadow-lg text-sm">
          {filtered.map(c => (
            <div
              key={c.custcode}
              onMouseDown={e => {
                e.preventDefault();
                onSelect(c);
                setOpen(false);
              }}
              className="px-3 py-2 hover:bg-blue-50 cursor-pointer flex justify-between gap-3 border-b border-slate-100 last:border-b-0"
            >
              <span className="text-slate-700 truncate">{c.companyname}</span>
              <span className="font-mono text-xs text-blue-600 shrink-0">{c.custcode}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── API credentials panel ─────────────────────────────────────────────────────

const SECRET_FIELDS = [
  { key: 'pax8_client_id',     label: 'PAX8 Client ID',     secret: false, placeholder: 'UUID' },
  { key: 'pax8_client_secret', label: 'PAX8 Client Secret', secret: true,  placeholder: '••••••••' },
  { key: 'moneo_api_key',      label: 'Moneo API Key',      secret: true,  placeholder: '••••••••' },
  { key: 'moneo_company_id',   label: 'Moneo Company ID',   secret: false, placeholder: 'piem. 12345' },
];

function ApiSettingsPanel() {
  const [status, setStatus] = useState({});
  const [values, setValues] = useState({});
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);
  const [showToast, toastEl] = useToast();

  const load = useCallback(() => {
    setLoading(true);
    apiFetch('/api/secrets')
      .then(setStatus)
      .catch(e => showToast(`Kļūda ielādējot: ${e.message}`, 'error'))
      .finally(() => setLoading(false));
  }, []);

  useEffect(() => { load(); }, [load]);

  async function handleSave() {
    const patch = {};
    for (const f of SECRET_FIELDS) {
      const v = (values[f.key] || '').trim();
      if (v) patch[f.key] = v;
    }
    if (Object.keys(patch).length === 0) {
      showToast('Nav jaunu vērtību ko saglabāt', 'info');
      return;
    }
    setSaving(true);
    try {
      const res = await apiFetch('/api/secrets', {
        method: 'POST',
        body: JSON.stringify(patch),
      });
      setStatus(res.secrets || {});
      setValues({});
      showToast('API atslēgas saglabātas', 'success');
    } catch (e) {
      showToast(`Kļūda: ${e.message}`, 'error');
    } finally {
      setSaving(false);
    }
  }

  async function handleClear(key) {
    if (!confirm(`Notīrīt ${key}?`)) return;
    setSaving(true);
    try {
      const res = await apiFetch('/api/secrets', {
        method: 'POST',
        body: JSON.stringify({ [key]: null }),
      });
      setStatus(res.secrets || {});
      showToast('Vērtība notīrīta', 'info');
    } catch (e) {
      showToast(`Kļūda: ${e.message}`, 'error');
    } finally {
      setSaving(false);
    }
  }

  return (
    <div className="bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden">
      {toastEl}
      <div className="px-5 py-4 border-b border-slate-100">
        <h2 className="font-semibold text-slate-700">API atslēgas</h2>
        <p className="text-xs text-slate-400 mt-1">
          PAX8 un Moneo API konfigurācija. Tukšu lauku atstājot, esošā vērtība netiek mainīta.
        </p>
      </div>

      {loading ? (
        <div className="py-10 flex justify-center"><Spinner /></div>
      ) : (
        <div className="p-5 space-y-4">
          {SECRET_FIELDS.map(f => {
            const s = status[f.key] || {};
            return (
              <div key={f.key} className="grid grid-cols-1 sm:grid-cols-3 gap-3 items-center">
                <label className="text-sm font-medium text-slate-600">{f.label}</label>
                <div className="sm:col-span-2 flex items-center gap-2">
                  <input
                    type={f.secret ? 'password' : 'text'}
                    value={values[f.key] || ''}
                    onChange={e => setValues(v => ({ ...v, [f.key]: e.target.value }))}
                    placeholder={s.configured ? s.preview : f.placeholder}
                    autoComplete="off"
                    className="flex-1 border border-slate-300 rounded-lg px-3 py-1.5 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-blue-400"
                  />
                  {s.configured && (
                    <>
                      <span className={`text-xs px-2 py-1 rounded ${s.source === 'file' ? 'bg-green-100 text-green-700' : 'bg-slate-100 text-slate-600'}`}>
                        {s.source === 'file' ? 'Saglabāts' : 'Env'}
                      </span>
                      {s.source === 'file' && (
                        <button
                          onClick={() => handleClear(f.key)}
                          disabled={saving}
                          className="text-red-500 hover:text-red-700 text-xs disabled:opacity-50"
                        >
                          Notīrīt
                        </button>
                      )}
                    </>
                  )}
                  {!s.configured && (
                    <span className="text-xs px-2 py-1 rounded bg-amber-100 text-amber-700">
                      Nav iestatīts
                    </span>
                  )}
                </div>
              </div>
            );
          })}

          <div className="flex justify-end pt-2 border-t border-slate-100">
            <button
              onClick={handleSave}
              disabled={saving}
              className="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium px-4 py-1.5 rounded-lg disabled:opacity-50 transition-colors"
            >
              {saving ? <Spinner small /> : null}
              Saglabāt API atslēgas
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Config tab ────────────────────────────────────────────────────────────────

function ConfigTab() {
  const [pax8Companies, setPax8Companies] = useState([]);
  const [mappings, setMappings] = useState({});
  const [moneoCustomers, setMoneoCustomers] = useState([]);
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState(null);
  const [showToast, toastEl] = useToast();
  const [editRow, setEditRow] = useState(null); // pax8_id being edited
  const [editValues, setEditValues] = useState({ moneo_code: '', moneo_name: '' });

  useEffect(() => {
    Promise.all([
      apiGetCached('companies', '/api/companies'),
      apiGetCached('config', '/api/config'),
      apiGetCached('moneo-customers', '/api/moneo-customers').catch(() => []),
    ])
      .then(([companies, cfg, customers]) => {
        setPax8Companies(companies);
        setMappings(cfg);
        setMoneoCustomers(Array.isArray(customers) ? customers : []);
      })
      .catch(e => setError(e.message))
      .finally(() => setLoading(false));
  }, []);

  function startEdit(company) {
    const m = mappings[company.pax8_id] || {};
    setEditRow(company.pax8_id);
    setEditValues({
      moneo_code: m.moneo_code || '',
      moneo_name: m.moneo_name || company.moneo_name || '',
    });
  }

  async function saveEdit(pax8Id) {
    setSaving(true);
    try {
      const newMapping = {
        [pax8Id]: {
          moneo_code: editValues.moneo_code.trim(),
          moneo_name: editValues.moneo_name.trim(),
          split_subscriptions: mappings[pax8Id]?.split_subscriptions || {},
        },
      };
      const updated = await apiFetch('/api/config', {
        method: 'POST',
        body: JSON.stringify(newMapping),
      });
      setMappings(updated.mappings || {});
      __apiCache.set('config', updated.mappings || {});
      cacheInvalidate('status');
      setEditRow(null);
      showToast('Kartēšana saglabāta', 'success');
    } catch (e) {
      showToast(`Kļūda: ${e.message}`, 'error');
    } finally {
      setSaving(false);
    }
  }

  async function deleteMapping(pax8Id) {
    if (!confirm('Dzēst šo kartēšanu?')) return;
    setSaving(true);
    try {
      const patch = { [pax8Id]: null };
      const updated = await apiFetch('/api/config', {
        method: 'POST',
        body: JSON.stringify(patch),
      });
      setMappings(updated.mappings || {});
      __apiCache.set('config', updated.mappings || {});
      cacheInvalidate('status');
      showToast('Kartēšana dzēsta', 'info');
    } catch (e) {
      showToast(`Kļūda: ${e.message}`, 'error');
    } finally {
      setSaving(false);
    }
  }

  if (loading) return <div className="flex justify-center py-20"><Spinner /></div>;

  return (
    <div className="space-y-5">
      {toastEl}

      <ApiSettingsPanel />

      {error && (
        <div className="bg-red-50 border border-red-200 rounded-xl p-4 text-red-700 text-sm">
          <strong>Kļūda:</strong> {error}
        </div>
      )}

      <div className="bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden">
        <div className="px-5 py-4 border-b border-slate-100">
          <h2 className="font-semibold text-slate-700">PAX8 → Moneo uzņēmumu kartēšana</h2>
          <p className="text-xs text-slate-400 mt-1">
            Norādiet katram PAX8 uzņēmumam atbilstošo Moneo klienta kodu.
          </p>
        </div>
        <table className="min-w-full divide-y divide-slate-100">
          <thead className="bg-slate-50">
            <tr>
              <th className="px-4 py-3 text-left text-xs font-semibold text-slate-500 uppercase">PAX8 uzņēmums</th>
              <th className="px-4 py-3 text-left text-xs font-semibold text-slate-500 uppercase">PAX8 ID</th>
              <th className="px-4 py-3 text-left text-xs font-semibold text-slate-500 uppercase">Moneo kods</th>
              <th className="px-4 py-3 text-left text-xs font-semibold text-slate-500 uppercase">Moneo nosaukums</th>
              <th className="px-4 py-3 text-center text-xs font-semibold text-slate-500 uppercase">Darbības</th>
            </tr>
          </thead>
          <tbody className="divide-y divide-slate-100">
            {pax8Companies.map(company => {
              const m = mappings[company.pax8_id] || {};
              const isEditing = editRow === company.pax8_id;
              return (
                <tr key={company.pax8_id} className={isEditing ? 'bg-blue-50' : 'hover:bg-slate-50'}>
                  <td className="px-4 py-3 text-sm font-medium text-slate-800">{company.pax8_name}</td>
                  <td className="px-4 py-3 text-xs font-mono text-slate-400 max-w-xs truncate" title={company.pax8_id}>
                    {company.pax8_id}
                  </td>
                  {isEditing ? (
                    <>
                      <td className="px-4 py-2">
                        <input
                          type="text"
                          value={editValues.moneo_code}
                          onChange={e => setEditValues(v => ({ ...v, moneo_code: e.target.value }))}
                          placeholder="1013"
                          className="w-24 border border-blue-300 rounded px-2 py-1 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
                        />
                      </td>
                      <td className="px-4 py-2">
                        <MoneoCustomerAutocomplete
                          customers={moneoCustomers}
                          value={editValues.moneo_name}
                          onChange={name => setEditValues(v => ({ ...v, moneo_name: name }))}
                          onSelect={c => setEditValues({ moneo_code: c.custcode, moneo_name: c.companyname })}
                          placeholder="Sāc rakstīt nosaukumu..."
                          className="w-56 border border-blue-300 rounded px-2 py-1 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
                        />
                      </td>
                      <td className="px-4 py-2 text-center">
                        <div className="flex items-center justify-center gap-2">
                          <button
                            onClick={() => saveEdit(company.pax8_id)}
                            disabled={saving}
                            className="bg-green-600 hover:bg-green-700 text-white text-xs font-medium px-3 py-1 rounded transition-colors disabled:opacity-50"
                          >
                            {saving ? <Spinner small /> : 'Saglabāt'}
                          </button>
                          <button
                            onClick={() => setEditRow(null)}
                            className="text-slate-500 hover:text-slate-800 text-xs px-2 py-1"
                          >
                            Atcelt
                          </button>
                        </div>
                      </td>
                    </>
                  ) : (
                    <>
                      <td className="px-4 py-3 text-sm">
                        {m.moneo_code ? (
                          <span className="font-mono font-medium text-blue-700">{m.moneo_code}</span>
                        ) : (
                          <span className="text-slate-300 italic text-xs">Nav</span>
                        )}
                      </td>
                      <td className="px-4 py-3 text-sm text-slate-700">
                        {m.moneo_name || <span className="text-slate-300 italic text-xs">—</span>}
                      </td>
                      <td className="px-4 py-3 text-center">
                        <div className="flex items-center justify-center gap-2">
                          <button
                            onClick={() => startEdit(company)}
                            className="text-blue-600 hover:text-blue-800 text-xs font-medium underline"
                          >
                            Rediģēt
                          </button>
                          {m.moneo_code && (
                            <button
                              onClick={() => deleteMapping(company.pax8_id)}
                              className="text-red-500 hover:text-red-700 text-xs"
                            >
                              Dzēst
                            </button>
                          )}
                        </div>
                      </td>
                    </>
                  )}
                </tr>
              );
            })}
            {pax8Companies.length === 0 && (
              <tr>
                <td colSpan={5} className="px-4 py-8 text-center text-slate-400 italic text-sm">
                  Nav PAX8 uzņēmumu. Pārbaudiet PAX8 API konfigurāciju.
                </td>
              </tr>
            )}
          </tbody>
        </table>
      </div>

      {/* Info box */}
      <div className="bg-blue-50 border border-blue-200 rounded-xl p-4 text-blue-800 text-sm space-y-1">
        <div className="font-semibold">Kā darbojas kartēšana</div>
        <ul className="list-disc list-inside space-y-0.5 text-blue-700">
          <li>Katram PAX8 uzņēmumam norādiet Moneo klienta kodu (piem., 1013)</li>
          <li>SKU kodi Moneo rēķinos: PAX8 SKU + "<strong>-M</strong>" (mēneša) vai "<strong>-Y</strong>" (gada)</li>
          <li>Rēķinos izmanto PAX8 SKU kodus — nevis Moneo iekšējos kodus</li>
          <li>PVN 21% tiek aprēķināts automātiski peļņas kalkulācijā</li>
        </ul>
      </div>
    </div>
  );
}

                  <StatusBadge status={
                    inv.payment_status === 'paid' ? 'invoiced_paid' :
                    inv.payment_status === 'unpaid' ? 'invoiced_unpaid' : 'invoiced_unpaid'
                  } />
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ── App shell ─────────────────────────────────────────────────────────────────

const TABS = [
  { id: 'dashboard', label: 'Pārskats' },
  { id: 'invoices',  label: 'Rēķini' },
  { id: 'config',    label: 'Iestatījumi' },
];

function App() {
  const [tab, setTab] = useState('dashboard');

  return (
    <div className="min-h-screen bg-slate-100">
      {/* Header */}
      <header className="bg-white border-b border-slate-200 shadow-sm sticky top-0 z-40">
        <div className="max-w-7xl mx-auto px-4 sm:px-6 flex items-center justify-between h-14">
          <div className="flex items-center gap-3">
            <div className="bg-blue-600 text-white text-xs font-bold px-2 py-1 rounded">PAX8</div>
            <span className="text-slate-400 font-light">↔</span>
            <div className="bg-indigo-600 text-white text-xs font-bold px-2 py-1 rounded">MONEO</div>
            <span className="text-slate-600 font-semibold ml-2 hidden sm:inline">Microsoft pakalpojumu rēķinošana</span>
          </div>
          <nav className="flex gap-1">
            {TABS.map(t => (
              <button
                key={t.id}
                onClick={() => setTab(t.id)}
                className={`px-4 py-2 rounded-lg text-sm font-medium transition-colors ${
                  tab === t.id
                    ? 'bg-blue-600 text-white shadow-sm'
                    : 'text-slate-600 hover:bg-slate-100'
                }`}
              >
                {t.label}
              </button>
            ))}
          </nav>
        </div>
      </header>

      {/* Main content */}
      <main className="max-w-7xl mx-auto px-4 sm:px-6 py-6">
        {tab === 'dashboard' && <DashboardTab />}
        {tab === 'invoices'  && <InvoicesTab />}
        {tab === 'config'    && <ConfigTab />}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
